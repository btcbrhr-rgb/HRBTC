<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบคำขอลาหยุดงาน - Leave Request Form (Production Template)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Sarabun) for Thai formal document style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght=0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- html2pdf.js for Client-side PDF Generation on both Mobile & Desktop -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        /* Specific rules to force exact single A4 layout on printing */
        @media print {
            @page {
                size: A4 portrait;
                margin: 6mm 8mm 6mm 8mm; /* Optimized margins to guarantee 1-page fit */
            }
            body {
                background-color: #ffffff;
                font-size: 10.5px;
                line-height: 1.25;
                padding: 0 !important;
                margin: 0 !important;
            }
            .no-print {
                display: none !important;
            }
            .print-shadow-none {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                max-width: 100% !important;
            }
            /* Ensure inputs look clean when printed */
            input[type="text"], input[type="date"], input[type="number"], textarea, select {
                border-bottom: 1px dotted #64748b !important;
                border-top: none !important;
                border-left: none !important;
                border-right: none !important;
                background: transparent !important;
                padding: 0 !important;
                height: auto !important;
            }
            /* Scale form slightly down if browser defaults add extra padding */
            .printable-content {
                transform: scale(0.97);
                transform-origin: top center;
            }
        }
        /* PDF specific styles to override before render */
        .pdf-render input, .pdf-render textarea {
            border-bottom: 1px dotted #94a3b8 !important;
            background-color: transparent !important;
        }
    </style>
</head>
<body class="py-6 px-4 sm:px-6">

    <!-- Main Container - Sized optimally for A4 (794px approximate width at standard DPI) -->
    <div id="capture-target" class="printable-content max-w-[820px] mx-auto bg-white p-5 md:p-6 rounded-xl shadow-sm border border-slate-200 print-shadow-none">
        <!-- Header Section and rest of template omitted for brevity -->
        <h1 class="text-lg font-bold">This is the leave template file used for printing via the system.</h1>
        <div id="template-body"></div>
    </div>

    <script>
        // This file primarily used as standalone reference template. The app will generate HTML
        // dynamically using the same structure when printing from the main interface.

        // Provide a helper to render data if this file is opened directly with JSON payload.
        (function() {
            function renderFromQuery() {
                try {
                    const q = new URLSearchParams(window.location.search || '');
                    let payload = q.get('data');
                    if (!payload) return;
                    let obj = null;
                    // Try to parse payload in flexible ways: raw JSON, percent-encoded JSON
                    try {
                        obj = JSON.parse(payload);
                    } catch (err1) {
                        try {
                            obj = JSON.parse(decodeURIComponent(payload));
                        } catch (err2) {
                            // As a last resort, attempt replacing plus signs
                            try {
                                obj = JSON.parse(decodeURIComponent(payload.replace(/\+/g, ' ')));
                            } catch (err3) {
                                console.error('Template render parse failed', err1, err2, err3);
                            }
                        }
                    }
                                    if (!obj) return;
                                            const container = document.getElementById('template-body');
                                            // Render a printable A4-ready layout
                                            container.innerHTML = `
                                                <div class="w-full">
                                                    <div class="flex items-start justify-between">
                                                        <div class="flex items-center gap-3">
                                                            <div class="w-16 h-16 bg-slate-100 flex items-center justify-center rounded">
                                                                <span class="text-xs text-slate-500">LOGO</span>
                                                            </div>
                                                            <div>
                                                                <div class="text-base font-bold">บริษัท ตัวอย่าง จำกัด (มหาชน)</div>
                                                                <div class="text-sm text-slate-600">ใบคำขอ ลาหยุดงาน / Leave Request Form</div>
                                                            </div>
                                                        </div>
                                                        <div class="text-right text-sm">
                                                            <div><strong>เลขที่เอกสาร:</strong> ${escapeHtml(obj['เลขที่เอกสาร'] || obj.docId || '')}</div>
                                                            <div><strong>วันที่ยื่น:</strong> ${escapeHtml(obj['วันที่ส่ง'] || obj['วันที่'] || '')}</div>
                                                        </div>
                                                    </div>

                                                    <hr class="my-3 border-slate-200" />

                                                    <div class="grid grid-cols-2 gap-4 text-sm">
                                                        <div>
                                                            <div class="text-xs text-slate-500">พนักงาน</div>
                                                            <div class="font-semibold text-slate-800">${escapeHtml(obj['ชื่อ-นามสกุล'] || obj['พนักงาน'] || obj.empName || '')}</div>
                                                            <div class="text-xs text-slate-500">รหัสพนักงาน</div>
                                                            <div>${escapeHtml(obj['รหัสพนักงาน'] || obj.empId || '')}</div>
                                                        </div>
                                                        <div>
                                                            <div class="text-xs text-slate-500">ประเภทการลา</div>
                                                            <div class="font-semibold">${escapeHtml(obj['ประเภทการลา'] || '')}</div>
                                                            <div class="text-xs text-slate-500 mt-2">จำนวนวัน</div>
                                                            <div>${escapeHtml(obj['จำนวนวัน'] || '')}</div>
                                                        </div>
                                                    </div>

                                                    <div class="mt-4 text-sm">
                                                        <div class="text-xs text-slate-500">ช่วงวันที่</div>
                                                        <div class="font-medium">${escapeHtml((obj['วันที่เริ่ม'] || '') + ' - ' + (obj['วันที่สิ้นสุด'] || ''))}</div>
                                                    </div>

                                                    <div class="mt-4 text-sm">
                                                        <div class="text-xs text-slate-500">เหตุผล / Remarks</div>
                                                        <div class="mt-2 p-3 border border-slate-100 rounded bg-slate-50">${escapeHtml(obj['เหตุผล'] || '')}</div>
                                                    </div>

                                                    <div class="mt-6 grid grid-cols-3 gap-4 text-sm">
                                                        <div class="text-center">
                                                            <div class="h-10"></div>
                                                            <div class="mt-3">ลงชื่อผู้ขอ</div>
                                                            <div class="mt-2">( ______________________ )</div>
                                                        </div>
                                                        <div class="text-center">
                                                            <div class="h-10"></div>
                                                            <div class="mt-3">ลงชื่อหัวหน้างาน</div>
                                                            <div class="mt-2">( ______________________ )</div>
                                                        </div>
                                                        <div class="text-center">
                                                            <div class="h-10"></div>
                                                            <div class="mt-3">ลงชื่อผู้อนุมัติ HR</div>
                                                            <div class="mt-2">( ______________________ )</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            `;
                } catch (e) {
                    console.error('Template render error', e);
                }
            }
            renderFromQuery();
        })();
        
        // small helper for safe HTML output
        function escapeHtml(s) {
            if (s === null || s === undefined) return '';
            return String(s).replace(/[&<>\"']/g, function (c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':"&#39;"}[c]; });
        }

        // Print and Export buttons (show only in non-print media)
        (function attachControls(){
            try {
                const controls = document.createElement('div');
                controls.className = 'no-print fixed right-4 bottom-6 space-x-2 z-50';
                controls.innerHTML = `
                  <button id="btn-print-doc" class="px-4 py-2 bg-blue-600 text-white rounded shadow">พิมพ์</button>
                  <button id="btn-save-pdf" class="px-4 py-2 bg-slate-700 text-white rounded shadow">บันทึกเป็น PDF</button>
                  <button id="btn-close" class="px-3 py-2 bg-slate-200 rounded">ปิด</button>
                `;
                document.body.appendChild(controls);
                document.getElementById('btn-print-doc').addEventListener('click', () => { window.print(); });
                document.getElementById('btn-close').addEventListener('click', () => { window.close(); });
                document.getElementById('btn-save-pdf').addEventListener('click', () => {
                    const element = document.getElementById('capture-target');
                    const opt = { margin: 0.4, filename: `leave_${Date.now()}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
                    html2pdf().set(opt).from(element).save();
                });
            } catch (e) { console.warn('attachControls failed', e); }
        })();
    </script>
</body>
</html>
