<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRBTC - Human Resource System</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/4f46e5/ffffff?text=HR">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #1e293b; overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #ffffff; display: flex; flex-direction: column; position: relative; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-morphism { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .active-nav { color: #4f46e5 !important; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container shadow-2xl">
    <!-- Header -->
    <header class="sticky top-0 z-50 glass-morphism border-b border-slate-100 px-5 py-3 flex justify-between items-center h-20">
        <div class="flex flex-col">
            <h1 id="view-title" class="text-xl font-bold text-indigo-900 leading-tight">HRBTC</h1>
            <span id="user-info-header" class="text-[11px] text-indigo-600/70 font-semibold hidden tracking-tight">สมชาย ยอดรัก (EM69001)</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-2xl bg-indigo-50 border border-indigo-100 flex items-center justify-center overflow-hidden">
                <img src="https://placehold.co/100x100/4f46e5/ffffff?text=SY" alt="User">
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 px-5">
        
        <!-- View: Home -->
        <section id="view-home" class="py-5 space-y-6">
            <div class="space-y-1">
                <h2 class="text-2xl font-extrabold text-slate-800">สวัสดีครับ 👋</h2>
                <p class="text-slate-500 font-medium">คุณสมชาย ยอดรัก (EM69001)</p>
            </div>

            <!-- Dashboard Stats -->
            <div class="grid grid-cols-5 gap-2" id="stats-container">
                <div class="bg-indigo-50/50 p-2 rounded-2xl border border-indigo-100 text-center">
                    <p class="text-[9px] text-indigo-400 font-bold uppercase mb-1">วันทำงาน</p>
                    <p class="text-lg font-bold text-indigo-700">22</p>
                </div>
                <div class="bg-amber-50/50 p-2 rounded-2xl border border-amber-100 text-center">
                    <p class="text-[9px] text-amber-500 font-bold uppercase mb-1">สาย(น.)</p>
                    <p class="text-lg font-bold text-amber-700">15</p>
                </div>
                <div class="bg-emerald-50/50 p-2 rounded-2xl border border-emerald-100 text-center">
                    <p class="text-[9px] text-emerald-500 font-bold uppercase mb-1">โอที(ช.ม.)</p>
                    <p class="text-lg font-bold text-emerald-700">12.5</p>
                </div>
                <div class="bg-rose-50/50 p-2 rounded-2xl border border-rose-100 text-center">
                    <p class="text-[9px] text-rose-500 font-bold uppercase mb-1">ขาด(วัน)</p>
                    <p class="text-lg font-bold text-rose-700">0</p>
                </div>
                <div class="bg-purple-50/50 p-2 rounded-2xl border border-purple-100 text-center">
                    <p class="text-[9px] text-purple-500 font-bold uppercase mb-1">ลา(วัน)</p>
                    <p class="text-lg font-bold text-purple-700">2</p>
                </div>
            </div>

            <div class="bg-gradient-to-br from-slate-900 to-indigo-950 rounded-[32px] p-6 text-white relative overflow-hidden">
                <p class="text-[10px] uppercase tracking-widest font-black text-indigo-300 mb-4">รอบบัญชีปัจจุบัน</p>
                <p class="text-xl font-bold mb-1">26 พ.ค. - 25 มิ.ย.</p>
                <div class="w-full bg-white/10 h-2 rounded-full mt-4"><div class="bg-indigo-500 h-full w-[65%]"></div></div>
            </div>
        </section>

        <!-- View: Time Record -->
        <section id="view-timerecord" class="hidden py-5 space-y-6">
            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[11px] font-black text-slate-400 uppercase">โครงการ / สถานที่</label>
                    <select id="project-select" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-sm font-bold outline-none">
                        <option>สำนักงานใหญ่ - กรุงเทพฯ</option>
                        <option>โครงการก่อสร้าง A - ชลบุรี</option>
                    </select>
                </div>

                <div class="relative w-full aspect-video bg-slate-900 rounded-[32px] overflow-hidden flex items-center justify-center">
                    <video id="camera-feed" class="w-full h-full object-cover opacity-60" autoplay playsinline></video>
                    <span class="absolute bottom-4 text-[10px] text-white/80 bg-white/10 px-4 py-1.5 rounded-full backdrop-blur-xl font-bold">GPS: VERIFIED ✅</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleDatabaseCheck('IN')" class="bg-indigo-600 text-white p-6 rounded-[32px] font-bold shadow-lg flex flex-col items-center gap-2 active:scale-95 transition-all">
                        <i class="fa-solid fa-fingerprint text-2xl"></i>
                        <span>เข้างาน</span>
                    </button>
                    <button onclick="handleDatabaseCheck('OUT')" class="bg-white border-2 border-slate-100 text-slate-800 p-6 rounded-[32px] font-bold flex flex-col items-center gap-2 active:scale-95 transition-all">
                        <i class="fa-solid fa-right-from-bracket text-2xl"></i>
                        <span>ออกงาน</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- View: Other placeholders (Leave, More, etc.) -->
        <section id="view-leave" class="hidden py-5">
             <p class="text-center text-slate-400 py-20 font-medium">ส่วนของการลา กำลังเชื่อมต่อฐานข้อมูล...</p>
        </section>

    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto glass-morphism border-t border-slate-50 safe-area-bottom z-[100]">
        <div class="flex justify-around items-center h-20">
            <button onclick="navigateTo('home')" id="nav-home" class="flex flex-col items-center gap-1 flex-1 active-nav">
                <i class="fa-solid fa-house-chimney text-lg"></i>
                <span class="text-[9px] font-bold uppercase">หน้าแรก</span>
            </button>
            <button onclick="navigateTo('timerecord')" id="nav-timerecord" class="flex flex-col items-center gap-1 flex-1 text-slate-400">
                <div class="w-14 h-14 bg-indigo-600 rounded-2xl shadow-lg flex items-center justify-center text-white -mt-10 border-4 border-white">
                    <i class="fa-solid fa-fingerprint text-xl"></i>
                </div>
                <span class="text-[9px] font-bold uppercase mt-1">ลงเวลา</span>
            </button>
            <button onclick="navigateTo('leave')" id="nav-leave" class="flex flex-col items-center gap-1 flex-1 text-slate-400">
                <i class="fa-solid fa-paper-plane text-lg"></i>
                <span class="text-[9px] font-bold uppercase">การลา</span>
            </button>
        </div>
    </nav>

    <!-- Toast Notification -->
    <div id="toast-notif" class="fixed top-6 left-6 right-6 max-w-[450px] mx-auto bg-white border border-slate-100 p-5 rounded-[28px] shadow-2xl z-[200] transform -translate-y-40 transition-transform duration-500 flex gap-4">
        <div id="toast-icon" class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center shrink-0">
            <i class="fa-solid fa-check"></i>
        </div>
        <div>
            <p class="text-xs font-black text-slate-800 uppercase">ระบบฐานข้อมูล</p>
            <p id="toast-msg" class="text-xs text-slate-500 mt-1">บันทึกข้อมูลเรียบร้อยแล้ว</p>
        </div>
    </div>
</div>

<script>
    // *** วาง URL จาก Google Apps Script ของคุณที่นี่ ***
    const DATABASE_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec'; 

    function navigateTo(viewId) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.getElementById(`view-${viewId}`).classList.remove('hidden');
        document.getElementById(`view-${viewId}`).classList.add('animate-slide-up');
        document.getElementById('view-title').innerText = viewId === 'home' ? 'HRBTC' : viewId.toUpperCase();
        document.getElementById('user-info-header').classList.toggle('hidden', viewId === 'home');
        
        document.querySelectorAll('nav button').forEach(b => b.classList.replace('active-nav', 'text-slate-400'));
        document.getElementById(`nav-${viewId}`).classList.add('active-nav');
    }

    async function handleDatabaseCheck(type) {
        const project = document.getElementById('project-select').value;
        showToast(`กำลังบันทึกข้อมูล ${type}...`, 'indigo');

        const payload = {
            empId: 'EM69001',
            type: type,
            project: project,
            location: 'GPS: Verified (13.75, 100.50)',
            sheet: 'Attendance'
        };

        try {
            // ในสถานการณ์จริง คุณต้องใช้ fetch() ส่งไปที่ DATABASE_URL
            // เนื่องจากติดเรื่อง CORS บน Browser ฝั่งหน้าบ้าน (Client) 
            // แนะนำให้ทดสอบส่งผ่านแอปจริงที่ออนไลน์แล้ว
            console.log("Sending to Sheets:", payload);
            
            // จำลองการส่งข้อมูลสำเร็จ
            setTimeout(() => {
                showToast(`บันทึก ${type} สำเร็จ! ข้อมูลถูกส่งไปยัง Google Sheets แล้ว`, 'emerald');
            }, 1500);

        } catch (error) {
            showToast('เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล', 'rose');
        }
    }

    function showToast(msg, color) {
        const toast = document.getElementById('toast-notif');
        document.getElementById('toast-msg').innerText = msg;
        document.getElementById('toast-icon').className = `w-12 h-12 bg-${color}-100 text-${color}-600 rounded-2xl flex items-center justify-center shrink-0`;
        toast.classList.remove('-translate-y-40');
        setTimeout(() => toast.classList.add('-translate-y-40'), 4000);
    }

    // Camera Simulation
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            document.getElementById('camera-feed').srcObject = stream;
        }).catch(() => console.log("Camera blocked"));
    }
</script>

</body>
</html>
